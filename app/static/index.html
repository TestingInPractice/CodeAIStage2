<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 2rem;
            width: 100%;
            max-width: 420px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; color: #1a1a1a; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.25rem; color: #333; }
        input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            margin-bottom: 0.25rem;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }
        input.invalid { border-color: #e74c3c; }
        .error-text { font-size: 0.75rem; color: #e74c3c; margin-top: -0.5rem; margin-bottom: 0.75rem; display: none; }
        .field-group { margin-bottom: 1rem; }
        .strength-bar-container {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 0.35rem;
            margin-bottom: 1rem;
            overflow: hidden;
            display: none;
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.3s, background 0.3s;
        }
        .strength-label {
            font-size: 0.7rem;
            margin-top: -0.75rem;
            margin-bottom: 0.75rem;
            display: none;
            font-weight: 600;
        }
        button {
            width: 100%;
            padding: 0.7rem;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #357abd; }
        button:disabled { background: #a0c4e8; cursor: not-allowed; }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.875rem;
            text-align: center;
            display: none;
        }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create Account</h1>
        <form id="registerForm" novalidate>
            <div class="field-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
                <div class="error-text" id="nameError">Name is required</div>
            </div>

            <div class="field-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <div class="error-text" id="emailError">Please enter a valid email</div>
            </div>

            <div class="field-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <div class="error-text" id="passwordError">Min 8 chars, 1 uppercase, 1 lowercase, 1 digit</div>
                <div class="strength-bar-container" id="strengthBarContainer">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>

            <div class="field-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
                <div class="error-text" id="confirmError">Passwords do not match</div>
            </div>

            <button type="submit" id="submitBtn">Register</button>
        </form>
        <div class="message" id="message"></div>
    </div>

    <script>
        const form = document.getElementById("registerForm");
        const messageEl = document.getElementById("message");

        const fields = {
            name:             { el: document.getElementById("name"),             err: document.getElementById("nameError") },
            email:            { el: document.getElementById("email"),            err: document.getElementById("emailError") },
            password:         { el: document.getElementById("password"),         err: document.getElementById("passwordError") },
            confirm_password: { el: document.getElementById("confirm_password"), err: document.getElementById("confirmError") },
        };

        const strengthBarContainer = document.getElementById("strengthBarContainer");
        const strengthBar = document.getElementById("strengthBar");
        const strengthLabel = document.getElementById("strengthLabel");

        const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const passRe  = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

        function showError(key, show) {
            fields[key].el.classList.toggle("invalid", show);
            fields[key].err.style.display = show ? "block" : "none";
        }

        function getStrength(pw) {
            let score = 0;
            if (pw.length >= 8) score++;
            if (/[a-z]/.test(pw)) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/\d/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            return score;
        }

        function updateStrengthIndicator(pw) {
            if (!pw) {
                strengthBarContainer.style.display = "none";
                strengthLabel.style.display = "none";
                return;
            }
            const score = getStrength(pw);
            const colors = ["#e74c3c", "#e67e22", "#f1c40f", "#2ecc71", "#27ae60"];
            const labels = ["Very Weak", "Weak", "Fair", "Strong", "Very Strong"];
            const idx = Math.min(score, 4);

            strengthBarContainer.style.display = "block";
            strengthLabel.style.display = "block";
            strengthBar.style.width = ((idx + 1) / 5 * 100) + "%";
            strengthBar.style.background = colors[idx];
            strengthLabel.textContent = labels[idx];
            strengthLabel.style.color = colors[idx];
        }

        function validateField(key) {
            const val = fields[key].el.value;
            let valid = true;

            switch (key) {
                case "name":
                    valid = val.trim().length > 0;
                    break;
                case "email":
                    valid = emailRe.test(val);
                    break;
                case "password":
                    valid = passRe.test(val);
                    break;
                case "confirm_password":
                    valid = val === fields.password.el.value && val.length > 0;
                    break;
            }

            showError(key, !valid);
            return valid;
        }

        Object.values(fields).forEach(f => {
            f.el.addEventListener("blur", () => validateField(
                Object.keys(fields).find(k => fields[k].el === f.el)
            ));
        });

        fields.password.el.addEventListener("input", () => {
            updateStrengthIndicator(fields.password.el.value);
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            let allValid = true;
            Object.keys(fields).forEach(k => {
                if (!validateField(k)) allValid = false;
            });
            if (!allValid) return;

            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            messageEl.style.display = "none";

            try {
                const res = await fetch("/api/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: fields.name.el.value.trim(),
                        email: fields.email.el.value.trim(),
                        password: fields.password.el.value,
                        confirm_password: fields.confirm_password.el.value,
                    }),
                });

                const data = await res.json();

                if (res.ok) {
                    messageEl.textContent = "Registration successful!";
                    messageEl.className = "message success";
                    form.reset();
                    strengthBarContainer.style.display = "none";
                    strengthLabel.style.display = "none";
                    Object.keys(fields).forEach(k => showError(k, false));
                } else {
                    messageEl.textContent = data.detail || "Registration failed";
                    if (Array.isArray(data.detail)) {
                        messageEl.textContent = data.detail.map(d => d.msg).join("; ");
                    }
                    messageEl.className = "message error";
                }
            } catch {
                messageEl.textContent = "Network error. Please try again.";
                messageEl.className = "message error";
            } finally {
                messageEl.style.display = "block";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
